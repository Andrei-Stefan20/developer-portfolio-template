<script>
  (function () {
    try {
      var mode = '{{ site.appearance.theme_mode | default: "auto" }}';
      var storedTheme = localStorage.getItem('theme');
      var systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      var theme = mode === 'auto' ? (storedTheme || systemTheme) : mode;

      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.setAttribute('data-theme-mode', mode);

      var storedBackground = localStorage.getItem('bg-pattern');
      var defaultBackground = '{{ site.appearance.background_pattern | default: "none" }}';
      if (storedBackground || defaultBackground !== 'none') {
        document.documentElement.setAttribute('data-bg', storedBackground || defaultBackground);
      }

      var storedFont = localStorage.getItem('font-style');
      var defaultFont = '{{ site.appearance.font_style | default: "default" }}';
      if ((storedFont || defaultFont) === 'hand') {
        document.documentElement.setAttribute('data-font', 'hand');
      }
    } catch (error) {}
  })();
</script>
