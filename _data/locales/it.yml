about_page:
  title: "Chi sono"
  intro: "Un breve riassunto di cosa fai e a cosa tieni. Compare subito sotto il tuo nome nella pagina Chi sono."
  sections:
    - title: "Percorso"
      paragraphs:
        - "Sostituisci con un paragrafo sulla tua formazione, il tuo percorso professionale o come hai iniziato. Due o tre frasi bastano."
        - "Questo secondo paragrafo può aggiungere dettagli: cosa hai studiato, dove hai lavorato, o cosa ha influenzato il tuo modo di lavorare."
    - title: "Di cosa mi occupo"
      paragraphs:
        - "Descrivi gli ambiti su cui ti concentri di solito: il tipo di problemi, tecnologie o domande di ricerca a cui dedichi più tempo."
        - "Aggiungi un secondo paragrafo se vuoi approfondire un interesse o una specializzazione specifica."
    - title: "Come lavoro"
      paragraphs:
        - "Descrivi il tuo modo di lavorare o i tuoi valori: cosa ottimizzi, come prendi decisioni, o cosa dovrebbe aspettarsi chi collabora con te."

