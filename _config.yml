locale: "en-US"
title: "Your Name"
description: "Software Engineer and Researcher"
url: "https://yourname.github.io"
baseurl: ""
repository: "yourname/yourname.github.io"
timezone: "Europe/Rome"
logo: "/images/profile.svg"

template:
  license_year: 2026
  custom_domain: ""

analytics:
  plausible_domain: ""

discussions:
  enabled: false
  repo: ""
  repo_id: ""
  category: "Announcements"
  category_id: ""

author:
  name: "Your Name"
  role: "Your Role"
  education: "Your Second Role or Field of Study"
  location: "Your City, Country"
  email: ""
  avatar: "/images/profile.svg"
  cv: ""
  github: "https://github.com/yourname"
  linkedin: "https://www.linkedin.com/in/yourname"
  scholar: ""
  orcid: ""

languages:
  default: en
  available:
    - code: en
      label: "EN"
      home_url: "/"
    - code: it
      label: "IT"
      home_url: "/it/"

appearance:
  accent_color: "#2b2b2b"
  recent_items_on_home: 5
  background_pattern: "grid"
  theme_mode: "auto"
  font_style: "default"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - README.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - SECURITY.md
  - CNAME.example
  - Gemfile
  - Gemfile.lock
  - vendor
  - content-templates
  - entries/README.md